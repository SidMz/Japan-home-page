<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="title">
                <h2>Travels</h2>
            </div>
            <!-- nav bar -->
            <nav>
                <ul>
                    <li><a href="">Home</a></li>
                    <li><a href="">Glimpses</a></li>
                    <li><a href="">Images</a></li>
                    <li><a href="">Contact</a></li>
                </ul>
            </nav>
            <!-- seach icon -->
            <div class="search">
                <input type="text" id="srch" placeholder="Search here">

                <div class="search-icon">
                    <i class="fa-brands fa-sistrix"></i>
                </div>
            </div>
        </header>
        <hr size="3px">
        <div class="content">
            <div class="text">
                <h1>JAPAN INVITES</h1>
            </div>
        </div>
    </div>
    <section class="main-content">
        <div class="images">
                <div class="box box1" style="grid-area: box1;">
                    <h1>Mount Fuji</h1>
                </div>
                <div class="box box2" style="grid-area: box2;">
                    <h1>Tokyo</h1>
                </div>
                <div class="box box3" style="grid-area: box3;">
                    <h1>Buddha</h1>
                </div>
                <div class="box box4" style="grid-area: box4;">
                    <h1>Fushimi Shrine</h1>
                </div>
                <div class="box box5" style="grid-area: box5;">
                    <h1>Shibuya</h1>
                </div>
            </div>
    </section>
</body>
</html>
